<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>validation</title>
    <script>
        function valid() {
            var ps = document.frm.i1.value;
            var cps = document.frm.i2.value;
            if (ps == cps) {
                alert("password match ");
            }
            else {
                alert("password not match");
            }
        }

    </script>
</head>

<body>
    <form name="frm">
        Numbers <input type="text " name="i1"><br>
        confirm password <input type="password" name="i2"><br>
        <input type="button" value="validate " onclick="valid()">
    </form>
</body>

</html>
