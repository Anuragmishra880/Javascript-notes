<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function em() {
            var em = document.frm.i1.value;
            var at = em.indexOf('@');
            var dot = em.lastIndexOf('.');
            if (at < 1 || dot < at + 2 || dot >= em.length + 2) {
                alert("incorrect email");
            }
            else {
                alert("welcome to home");
            }
        }
    </script>
</head>

<body>
    <form name="frm">
        Email <input type="text" name="i1"><br>
        <input type="button" value="Try It" onclick="em()">
    </form>
</body>

</html>
