            var cps = document.frm.i3.value;
            if (name == "" || name == null) {
                alert("name cannot be blank")
            }
            else {
                if (ps.length < 9) {
                    alert("password is weak");
                }
                else if (ps != cps) {
                    alert("password is not match");
                }
                else {
                    alert("welcome");
                }
            }

        }

    </script>
</head>

<body>
    <form name="frm">
        name <input type="text" name="i1" id=""> <br>
        password <input type="password" name="i2" id=""> <br>

        <input type="button" onclick="valid()" value="check">
