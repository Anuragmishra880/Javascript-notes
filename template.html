<html lang="en">

<head>
    <meta charset="UTF-8">

        body {

        }
#name{

        button {

cursor:grab;

    <script>
        function msg() {
            var n = document.frm.i1.value;
            var ph = document.frm.i2.value;
            if (n == "" || n == null) {
                alert("Not Empty");
            }
            else {
                if (isNaN(ph)) {
                    alert("please enter valid phone number");
                }
                else {
                    alert("welcome")
                }
            }
        }
    </script>
</head>

<body>
    <form name="frm">
        NAME <input type="text" name="i1" id="name" placeholder="Enter Your Name"><br><br>
        Contact Number <input type="text" name="i2" id="name1" placeholder="Enter Phone Number"><br><br>
      <button onclick="msg()" style="">OK</button> <button>cancel</button>
    </form>
