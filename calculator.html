    <script>
        function sum() {
            var n1 = parseInt(document.frm.i1.value);
            var n2 = parseInt(document.frm.i2.value);
            var sum = n1 + n2;
            frm.i3.value = sum;

        }
        function sub() {
            var n1 = parseInt(document.frm.i1.value);
            var n2 = parseInt(document.frm.i2.value);
            var sub = n1 - n2;
            frm.i3.value = sub;

        }
        function multi() {
            var n1 = parseInt(document.frm.i1.value);
            var n2 = parseInt(document.frm.i2.value);
            var multi = n1 * n2;
            frm.i3.value = multi;
        }
        function div() {
            var n1 = parseInt(document.frm.i1.value);
            var n2 = parseInt(document.frm.i2.value);
            var div = n1 / n2;
            frm.i3.value = div;
        }
        function percentage() {
            var n1 = parseInt(document.frm.i1.value);
            var n2 = parseInt(document.frm.i2.value);
            var percentage = n1 * n2 / 100;
            frm.i3.value = percentage;
        } function squre() {
            var n1 = parseInt(document.frm.i1.value);
            //   var n2 = parseInt(document.frm.i2.value);
            var squre = n1 * n1;
            //  var squre = n2 * n2;
            frm.i3.value = squre;
        }
        // function squreroot() {
        //     var n1 = parseInt(document.frm.i1.value);
        //     var n2 = parseInt(document.frm.i2.value);
        //     var squreroot = n1 ;
        // }
        function half() {
            var n1 = parseInt(document.frm.i1.value);
            // var n2 = parseInt(document.frm.i2.value);
            var half = n1 / 2;
            frm.i3.value = half;
        }
    </script>

        <input type="button" value="+" onclick="sum()" id="button1">

        <input type="button" value="*" onclick="multi()" id="button3">
        <input type="button" value="/" onclick="div()" id="button4">
        <input type="button" value="%" onclick="percentage()" id="button5">
        <input type="button" value="x2" onclick="squre()" id="button6">
