<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sum of digits</title>
    <script>
        function digits() {
            var n = parseInt(document.frm.i1.value);
            var d, sum = 0;
            while (n > 0) {
                d = n % 10;
                sum = sum + d;
                n = n / 10;
            }
            alert("sum of digits " + sum);
        }
    </script>
</head>

<body>
    <form name="frm">
        numbers <input type="text" name="i1"> <br>
        <input type="button" value="digits sum" onclick="digits()">
    </form>
</body>

</html>
