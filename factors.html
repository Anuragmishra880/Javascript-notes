<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function factors() {
            var n = parseInt(document.frm.i1.value);
            var i;
            for (i = 1; i <= n; i++) {
                if (n % i == 0) {
                    document.write(i);
                    document.write("<br>");


                }
            }
        }
    </script>
</head>

<body>
    <form name="frm">
        Number <input type="text" name="i1"><br>
        <input type="button" value="factors" onclick="factors()">
    </form>
</body>

</html>
