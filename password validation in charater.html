<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>validation</title>
    <script>
        function valid() {
            var ps = document.frm.i1.value;
            if (ps.length < 8) {
                alert("password must be  8 character ");
            }
            else {
                alert("")
            }
        }

    </script>
</head>

<body>
    <form name="frm">
        Numbers <input type="text " name="i1"><br>
        <input type="button" value="validate " onclick="valid()">
    </form>
</body>

</html>
