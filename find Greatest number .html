<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greatest</title>
    <script>
        function GR() {
            var n1 = parseInt(document.frm.i1.value);
            var n2 = parseInt(document.frm.i2.value);
            var n3 = parseInt(document.frm.i3.value);
            if (n1 > n2 & n1 > n3) {
                alert("n1 is Greatest");
            }
            else if (n2 > n1 & n2 > n3) {
                alert("n2 is Greatest");
            }
            else {
                alert("n3 is Greatest");
            }
        }
    </script>
</head>

<body>
    <form name="frm">
        NUMBER 1 <input type="text" name="i1"> <br>
        NUMBER 2 <input type="text" name="i2"><br>
        NUMBER 3 <input type="text" name="i3"><br>
        <input type="button" value="check" onclick="GR()">
    </form>
</body>

</html>
