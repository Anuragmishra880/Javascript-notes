<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function rev() {
            var n = parseInt(document.frm.i1.value);
            var d, rev = 0;
            while (n > 0) {
                d = n % 10;
                rev = (rev * 10) + d;
                n = n / 10;
            }
            alert("reverse of digits " + rev);
        }
    </script>
</head>

<body>
    <form name="frm">
        numbers <input type="text" name="i1"> <br>
        <input type="button" value="reverse" onclick="rev()">
    </form>
</body>

</html>
